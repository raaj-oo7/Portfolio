<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hoodie" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect width="64" height="64" rx="16" fill="#0a0b1e"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="14.5" fill="none" stroke="url(#ring)" stroke-width="2"/>

  <!-- body / hoodie -->
  <path d="M17 62 v-7 c0 -7.5 6.5 -12 15 -12 s15 4.5 15 12 v7 z" fill="url(#hoodie)"/>
  <path d="M26.5 44.5 q5.5 4.5 11 0 l-1.8 5.5 q-3.7 1.8 -7.4 0 z" fill="#312e81" opacity="0.6"/>

  <!-- head -->
  <circle cx="32" cy="27" r="13" fill="#f6c9a0"/>
  <circle cx="19.5" cy="28" r="2.2" fill="#f6c9a0"/>
  <circle cx="44.5" cy="28" r="2.2" fill="#f6c9a0"/>

  <!-- hair -->
  <path d="M19 27 a13 13 0 0 1 26 0 c0 -1.8 -1.4 -3.2 -2.8 -2.8 c-2.3 0.9 -3.7 -0.5 -4.6 -2.3 c-2.8 2.8 -9.3 3.2 -12.5 0.9 c-0.5 1.8 -1.9 3.2 -3.3 3.2 c-1.4 0 -2.8 -0.5 -2.8 1 z" fill="#241d3f"/>
  <path d="M19 27 q-1.4 2.3 0 4.6 q0.9 -2.3 2 -3.3 z" fill="#241d3f"/>
  <path d="M45 27 q1.4 2.3 0 4.6 q-0.9 -2.3 -2 -3.3 z" fill="#241d3f"/>

  <!-- eyes -->
  <g>
    <ellipse cx="27" cy="28.5" rx="1.8" ry="2.5" fill="#1c1830"/>
    <ellipse cx="37" cy="28.5" rx="1.8" ry="2.5" fill="#1c1830"/>
    <circle cx="27.6" cy="27.7" r="0.55" fill="#fff"/>
    <circle cx="37.6" cy="27.7" r="0.55" fill="#fff"/>
    <animateTransform attributeName="transform" type="scale" additive="sum"
      values="1 1; 1 1; 1 0.08; 1 1; 1 1" keyTimes="0; 0.9; 0.93; 0.96; 1"
      dur="4.2s" repeatCount="indefinite"/>
  </g>

  <!-- blush + smile -->
  <circle cx="23.5" cy="32.8" r="1.8" fill="#f472b6" opacity="0.35"/>
  <circle cx="40.5" cy="32.8" r="1.8" fill="#f472b6" opacity="0.35"/>
  <path d="M27.8 34 q4.2 3.5 8.4 0" stroke="#1c1830" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- waving arm + hand -->
  <g transform="rotate(12 46 51)">
    <path d="M46 51 q5.5 -3.7 7.4 -10" stroke="url(#hoodie)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <circle cx="53.8" cy="39.8" r="3.9" fill="#f6c9a0"/>
    <animateTransform attributeName="transform" type="rotate"
      values="0 46 51; 24 46 51; -4 46 51; 18 46 51; 0 46 51"
      dur="1.8s" repeatCount="indefinite"/>
  </g>

  <!-- sparkle -->
  <path d="M55 29 l0.9 2.2 2.2 0.9 -2.2 0.9 -0.9 2.2 -0.9 -2.2 -2.2 -0.9 2.2 -0.9 z" fill="#22d3ee">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
  </path>
</svg>
